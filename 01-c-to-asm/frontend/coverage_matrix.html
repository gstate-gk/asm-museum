  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    border: 1px solid #d3d1c7;

    border-radius: 6px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: opacity .15s;
    font-family: inherit;
  }
  .filter-bar button:hover { opacity: .85; }
  .filter-bar input[type="text"] {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid #b4b2a9;
    background: #fff;
    color: #1a1a18;
    outline: none;
    width: 190px;
    margin-left: auto;
    font-family: inherit;
  }
  .count-label {
    font-size: 11px;
    color: #888780;
    margin-bottom: 10px;
  }

  /* マトリクスカード */
  .matrix-card {
    margin-bottom: 16px;
    border-radius: 10px;
    overflow: hidden;
  }
  .matrix-header {
    padding: 9px 13px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .matrix-header .tid {
    font-weight: 500;
    font-size: 12px;
  }
  .matrix-header .sub {
    font-size: 11px;
    opacity: .65;
    margin-left: 7px;
  }
  .matrix-header .right {
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .matrix-header .combo-count { font-size: 11px; }
  .progress-track {
    width: 70px;
    height: 5px;
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill { height: 100%; border-radius: 3px; }
  .pct-label { font-size: 11px; font-weight: 500; }

  /* 固定軸セレクタ */
  .fix-bar {
    padding: 5px 12px;
    display: flex;
    gap: 5px;
    align-items: center;
  }
  .fix-bar .fix-label { font-size: 11px; opacity: .7; }
  .fix-btn {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    cursor: pointer;
    border: none;
    font-family: inherit;
    transition: opacity .15s;
  }
  .fix-btn:hover { opacity: .85; }

  /* テーブル */
  .matrix-table-wrap { padding: 10px 12px; overflow-x: auto; }
  .matrix-table {
    border-collapse: collapse;
    font-size: 11px;
    width: 100%;
  }
  .matrix-table th {
    padding: 4px 8px;
    font-weight: 500;
    color: #5f5e5a;
    white-space: nowrap;
  }
  .matrix-table th.row-axis {
    text-align: left;
    padding: 4px 10px;
  }
  .matrix-table td {
    padding: 5px 8px;
    text-align: center;
  }
  .matrix-table td.row-label {
    padding: 5px 10px;
    font-weight: 500;
    color: #5f5e5a;
    white-space: nowrap;
    text-align: left;
  }
  .matrix-table tr.odd { background: transparent; }

  .cell-covered, .cell-empty {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    font-size: 10px;
    font-weight: 500;
  }
  .cell-covered { color: #fff; }
  .cell-empty { background: transparent; }

  /* notes */
  .matrix-notes {
    padding: 6px 12px 10px;
    font-size: 11px;
    color: #888780;
    line-height: 1.6;
    white-space: pre-wrap;
  }

const CATS = {
  loop:             "ループ",
  array_pointer:    "配列・ポインタ",
  string_ops:       "文字列操作",
  struct_union:     "構造体・共用体",
  recursive_bitops: "再帰・ビット演算",
};
const COLORS = {
  loop:             { bg:"#EEEDFE", b:"#534AB7", t:"#3C3489" },
  array_pointer:    { bg:"#E1F5EE", b:"#0F6E56", t:"#085041" },
  string_ops:       { bg:"#FAECE7", b:"#993C1D", t:"#712B13" },
  struct_union:     { bg:"#FAEEDA", b:"#854F0B", t:"#633806" },
  recursive_bitops: { bg:"#FBEAF0", b:"#993556", t:"#72243E" },
};

// ─── アプリ状態 ───────────────────────────────
let selCat  = "all";
let search  = "";
let fixIdxMap = {};   // { [tid]: number }

// ─── ユーティリティ ────────────────────────────
function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) {
    Object.entries(attrs).forEach(([k, v]) => {
      if (k === "style" && typeof v === "object") {
        Object.assign(e.style, v);
      } else if (k.startsWith("on") && typeof v === "function") {
        e.addEventListener(k.slice(2).toLowerCase(), v);
      } else if (k === "className") {
        e.className = v;
      } else {
        e.setAttribute(k, v);
      }
    });
  }
  children.flat().forEach(c => {
    if (c == null) return;
    e.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  });
  return e;
}

function isCovered(covered, rowK, rowV, colK, colV, fixK, fixV) {
  if (fixK) return covered[rowK] === rowV && covered[colK] === colV && covered[fixK] === fixV;
  return covered[rowK] === rowV && covered[colK] === colV;
}

// ─── サマリー集計 ─────────────────────────────
function totalStats() {
  let tc = 0, tmpl = 0;
  Object.values(RAW).forEach(d => { tc += d.total_combos; tmpl++; });
  return { tc, tmpl, covered: tmpl };
}

function catStats() {
  const s = {};
  Object.keys(CATS).forEach(c => {
    const entries = Object.values(RAW).filter(d => d.category === c);
    s[c] = {
      tmpl: entries.length,
      tc:   entries.reduce((a, d) => a + d.total_combos, 0),
      covered: entries.length,
    };
  });
  return s;
}

// ─── マトリクスカード生成 ─────────────────────
function buildMatrix(tid, d) {
  const { axes, covered, notes, total_combos } = d;
  const ks   = Object.keys(axes);
  const is3  = ks.length >= 3;
  const fixK = is3 ? ks[0] : null;
  const rowK = is3 ? ks[1] : ks[0];
  const colK = is3 ? ks[2] : ks[1];
  const rowV = axes[rowK] || [];
  const colV = axes[colK] || [];
  const fixVs = is3 ? (axes[fixK] || []) : [];
  if (!(tid in fixIdxMap)) fixIdxMap[tid] = 0;
  const c   = COLORS[d.category] || COLORS.loop;
  const pct = Math.round((1 / total_combos) * 100);

  // カード全体
  const card = el("div", { className: "matrix-card",
    style: { border: `1px solid ${c.b}` } });

  // ── ヘッダ ──
  const header = el("div", { className: "matrix-header",
    style: { background: c.bg, borderBottom: `1px solid ${c.b}` } },
    el("div", null,
      el("span", { className: "tid",  style: { color: c.t } }, tid),
      el("span", { className: "sub",  style: { color: c.t } }, d.subcategory),
    ),
    el("div", { className: "right" },
      el("span", { className: "combo-count", style: { color: c.t } }, `1/${total_combos}通り`),
      el("div", { className: "progress-track", style: { background: c.b + "25" } },
        el("div", { className: "progress-fill",
          style: { width: pct + "%", background: c.b } }),
      ),
      el("span", { className: "pct-label", style: { color: c.t } }, pct + "%"),
    ),
  );
  card.appendChild(header);

  // ── 固定軸セレクタ（3軸のみ） ──
  let fixBar = null;
  if (is3) {
    fixBar = el("div", { className: "fix-bar",
      style: { background: c.bg, borderBottom: `1px solid ${c.b}30` } },
      el("span", { className: "fix-label", style: { color: c.t } }, fixK + ":"),
    );
    fixVs.forEach((v, i) => {
      const btn = el("button", {
        className: "fix-btn",
        style: {
          background: i === fixIdxMap[tid] ? c.b : c.b + "22",
          color:      i === fixIdxMap[tid] ? "#fff" : c.t,
          fontWeight: i === fixIdxMap[tid] ? "500" : "400",
        },
        onclick: () => { fixIdxMap[tid] = i; render(); },
      }, v);
      fixBar.appendChild(btn);
    });
    card.appendChild(fixBar);
  }

  // ── テーブル ──
  const fixV  = is3 ? fixVs[fixIdxMap[tid]] : null;
  const wrap  = el("div", { className: "matrix-table-wrap" });
  const table = el("table", { className: "matrix-table" });

  // thead
  const thead = el("thead");
  const hrow  = el("tr");
  hrow.appendChild(el("th", {
    className: "row-axis",
    style: { borderBottom: `1px solid ${c.b}30` },
  }, `${rowK} ↓ / ${colK} →`));
  colV.forEach(cv => {
    hrow.appendChild(el("th", {
      style: { textAlign: "center", borderBottom: `1px solid ${c.b}30` },
    }, cv));
  });
  thead.appendChild(hrow);
  table.appendChild(thead);

  // tbody
  const tbody = el("tbody");
  rowV.forEach((rv, ri) => {
    const tr = el("tr", {
      style: { background: ri % 2 ? c.bg + "50" : "transparent" },
    });
    tr.appendChild(el("td", {
      className: "row-label",
      style: { borderRight: `1px solid ${c.b}20` },
    }, rv));
    colV.forEach(cv => {
      const hit  = isCovered(covered, rowK, rv, colK, cv, fixK, fixV);
      const cell = el("span", {
        className: hit ? "cell-covered" : "cell-empty",
        style: hit
          ? { background: c.b }
          : { border: `1.5px dashed ${c.b}50`, color: c.b + "90" },
      }, hit ? "✓" : "○");
      tr.appendChild(el("td", null, cell));
    });
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  wrap.appendChild(table);
  card.appendChild(wrap);

  // ── notes ──
  if (notes) {
    card.appendChild(el("div", {
      className: "matrix-notes",
      style: { borderTop: `1px solid ${c.b}20` },
    }, notes));
  }

  return card;
}

// ─── メイン描画 ───────────────────────────────
function render() {
  const app  = document.getElementById("app");
  app.innerHTML = "";

  const { tc, tmpl, covered } = totalStats();
  const cs = catStats();
  const cats = Object.keys(CATS);

  // サマリーカード
  const summaryGrid = el("div", { className: "summary-grid" });
  [
    { label: "テンプレート数",   value: tmpl,           warn: false },
    { label: "組み合わせ総数",   value: tc,             warn: false },
    { label: "カバー済み",       value: covered,        warn: false },
    { label: "未カバー",         value: tc - covered,   warn: true  },
  ].forEach(({ label, value, warn }) => {
    summaryGrid.appendChild(el("div", { className: "summary-card" + (warn ? " warn" : "") },
      el("div", { className: "label" }, label),
      el("div", { className: "value" }, String(value)),
    ));
  });
  app.appendChild(summaryGrid);

  // カテゴリ別バー
  const catBars = el("div", { className: "cat-bars" });
  catBars.appendChild(el("div", { className: "section-label" },
    "カテゴリ別 組み合わせカバー率"));
  cats.forEach(c => {
    const s   = cs[c];
    const p   = Math.round((s.covered / s.tc) * 100);
    const col = COLORS[c];
    const row = el("div", { className: "cat-bar-row" });
    row.appendChild(el("div", { className: "cat-name", style: { color: col.t } }, CATS[c]));
    row.appendChild(el("div", { className: "cat-bar-track", style: { background: col.b + "22" } },
      el("div", { className: "cat-bar-fill",
        style: { width: p + "%", background: col.b } }),
    ));
    row.appendChild(el("div", { className: "cat-stat" },
      `${s.covered}/${s.tc} (${p}%) · ${s.tmpl}tmpl`));
    catBars.appendChild(row);
  });
  app.appendChild(catBars);

  // フィルターバー
  const filterBar = el("div", { className: "filter-bar" });

  // "すべて" ボタン
  const allBtn = el("button", {
    style: {
      background:  selCat === "all" ? "#1a1a18" : "#fff",
      color:       selCat === "all" ? "#fff"    : "#5f5e5a",
      border:      "1px solid #b4b2a9",
      fontWeight:  selCat === "all" ? "500" : "400",
    },
    onclick: () => { selCat = "all"; render(); },
  }, "すべて");
  filterBar.appendChild(allBtn);

  // カテゴリボタン
  cats.forEach(c => {
    const col    = COLORS[c];
    const active = selCat === c;
    filterBar.appendChild(el("button", {
      style: {
        background: active ? col.b : col.bg,
        color:      active ? "#fff" : col.t,
        border:     `1px solid ${col.b}`,
        fontWeight: active ? "500" : "400",
      },
      onclick: () => { selCat = c; render(); },
    }, CATS[c]));
  });

  // 検索ボックス
  const searchBox = el("input", {
    type: "text", placeholder: "ID で絞り込み...", value: search,
    oninput: (e) => { search = e.target.value; render(); },
  });
  filterBar.appendChild(searchBox);
  app.appendChild(filterBar);

  // フィルタリング
  const filtered = Object.entries(RAW).filter(([tid, d]) => {
    if (selCat !== "all" && d.category !== selCat) return false;
    if (search && !tid.includes(search) && !d.subcategory.includes(search)) return false;
    return true;
  });

  app.appendChild(el("div", { className: "count-label" },
    `${filtered.length} テンプレートを表示中`));

  // マトリクス一覧
  filtered.forEach(([tid, d]) => {
    app.appendChild(buildMatrix(tid, d));
  });
}

render();
</script>
</body>
</html>
